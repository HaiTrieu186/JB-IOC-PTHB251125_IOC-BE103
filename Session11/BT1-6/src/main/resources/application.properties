spring.application.name=BT3-6


## Cau hinh ket noi
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?currentSchema=be103_btvn_session10
spring.datasource.username=postgres
spring.datasource.password=123

## Cau hinh sql
spring.jpa.database=POSTGRESQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MultipartFile
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=0B

#log
# 1. Log c?a to‡n b? ?ng d?ng ? m?c INFO
logging.level.root=INFO
# 2. Log c?a Hibernate/JPA ? m?c DEBUG (?? xem c‚u l?nh SQL g?i xu?ng Database)
logging.level.org.hibernate.SQL=DEBUG
# xem chi ti?t c? c·c gi· tr? (tham s?) ???c truy?n v‡o c‚u SQL
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# 3. Log c?a package service ? m?c TRACE
logging.level.re.edu.bt36.service= TRACE

logging.file.name=logs/patient_web_service.log
logging.logback.rollingpolicy.max-file-size=2MB
logging.logback.rollingpolicy.file-name-pattern=logs/patient_web_service-%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-history=7